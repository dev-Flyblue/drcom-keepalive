<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.06" fill="#fff">
    <circle cx="50" cy="30" r="1.5"/><circle cx="80" cy="30" r="1.5"/><circle cx="110" cy="30" r="1.5"/><circle cx="140" cy="30" r="1.5"/><circle cx="170" cy="30" r="1.5"/>
    <circle cx="50" cy="55" r="1.5"/><circle cx="80" cy="55" r="1.5"/><circle cx="110" cy="55" r="1.5"/><circle cx="140" cy="55" r="1.5"/><circle cx="170" cy="55" r="1.5"/>
    <circle cx="630" cy="145" r="1.5"/><circle cx="660" cy="145" r="1.5"/><circle cx="690" cy="145" r="1.5"/><circle cx="720" cy="145" r="1.5"/><circle cx="750" cy="145" r="1.5"/>
    <circle cx="630" cy="170" r="1.5"/><circle cx="660" cy="170" r="1.5"/><circle cx="690" cy="170" r="1.5"/><circle cx="720" cy="170" r="1.5"/><circle cx="750" cy="170" r="1.5"/>
  </g>

  <!-- WiFi icon -->
  <g transform="translate(85, 100)" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round">
    <!-- Outer arc -->
    <path d="M-32,-18 A45,45 0 0,1 32,-18" opacity="0.4"/>
    <!-- Middle arc -->
    <path d="M-22,-10 A30,30 0 0,1 22,-10" opacity="0.65"/>
    <!-- Inner arc -->
    <path d="M-12,-3 A18,18 0 0,1 12,-3" opacity="0.9"/>
    <!-- Dot -->
    <circle cx="0" cy="8" r="4" fill="url(#accent)" stroke="none"/>
  </g>

  <!-- Heartbeat line -->
  <g transform="translate(45, 100)" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.2">
    <polyline points="0,40 15,40 20,40 25,30 30,50 35,35 40,45 45,40 80,40"/>
  </g>

  <!-- Title -->
  <text x="155" y="88" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">
    drcom-keepalive
  </text>

  <!-- Subtitle -->
  <text x="157" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#94a3b8">
    校园网认证保活 — 掉线自动重登 · 时段控制 · 永不断线
  </text>

  <!-- Tags -->
  <g transform="translate(157, 138)">
    <!-- Rust tag -->
    <rect x="0" y="0" width="52" height="22" rx="4" fill="#38bdf8" opacity="0.15"/>
    <text x="26" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#38bdf8" text-anchor="middle">Rust</text>
    <!-- Drcom tag -->
    <rect x="62" y="0" width="64" height="22" rx="4" fill="#818cf8" opacity="0.15"/>
    <text x="94" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#818cf8" text-anchor="middle">Drcom</text>
    <!-- XOR tag -->
    <rect x="136" y="0" width="80" height="22" rx="4" fill="#38bdf8" opacity="0.15"/>
    <text x="176" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#38bdf8" text-anchor="middle">XOR 0x77</text>
    <!-- Auto-login tag -->
    <rect x="226" y="0" width="80" height="22" rx="4" fill="#818cf8" opacity="0.15"/>
    <text x="266" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#818cf8" text-anchor="middle">Auto Login</text>
  </g>

  <!-- Right side: signal animation hint -->
  <g transform="translate(680, 65)" opacity="0.12" fill="#38bdf8">
    <rect x="0" y="40" width="8" height="12" rx="2"/>
    <rect x="14" y="30" width="8" height="22" rx="2"/>
    <rect x="28" y="18" width="8" height="34" rx="2"/>
    <rect x="42" y="6" width="8" height="46" rx="2"/>
    <rect x="56" y="0" width="8" height="52" rx="2"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="40" y="188" width="720" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
